<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Imagen Centrada - Bio-Comic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    /* ==============================
       RESET + VARS
    ============================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Comic Sans MS", cursive, sans-serif;
      /* ¡TU IMAGEN COMO BACKGROUND! */
      background-image: url('Imagenes/Imagen1.webp');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: #333;
      line-height: 1.6;
      padding-top: 60px;
      min-height: 100vh;
    }
    a {
      text-decoration: none;
      color: #0066cc;
    }

    /* ==============================
       HEADER FIJO (MENÚ)
    ============================== */
    header.fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, #000 0%, #222 100%);
      color: white;
      padding: 0.8rem 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 1000;
      border-bottom: 3px solid #ffcc00;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 1px;
      color: #ffcc00;
      text-shadow: 0 0 8px rgba(255, 204, 0, 0.8);
    }
    .menu {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }
    .menu a {
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      transition: background 0.3s, transform 0.2s;
    }
    .menu a:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(255, 204, 0, 0.6);
    }

    /* ==============================
       ESTILOS PARA LA IMAGEN CENTRADA
    ============================== */
    .image-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 60px); /* Ocupa el alto de la pantalla restando el menú */
      padding: 2rem;
    }
    .image-container img {
      max-width: 100%;
      height: auto;
      border: 4px solid #333; /* Estilo cómic */
      border-radius: 8px;
      box-shadow: 6px 6px 0px rgba(0,0,0,0.8); /* Sombra tipo cómic */
      background: white;
    }
  </style>
</head>
<body>

  <!-- Header original -->
  <header class="fixed-header">
    <nav class="navbar">
      <a href="#hero" class="brand">Bio-Comic</a>
      <ul class="menu">
        <li><a href="#hero">Inicio</a></li>
        <li><a href="#sobre-mi">Sobre Mí</a></li>
        <li><a href="#comics">Comics</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <!-- Contenedor único para la imagen -->
  <main>
    <section class="image-container">
      <!-- ⚠️ Reemplaza el src con la ruta de tu imagen -->
      <img src="/Imagenes/2.png" alt="Imagen Centrada">
    </section>
  </main>

</body>
</html>
